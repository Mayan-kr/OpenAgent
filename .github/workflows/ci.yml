name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test
      - run: npm run build
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --directory backend --all-groups
      - run: uv run --directory backend ruff check app tests
      - run: uv run --directory backend black --check app tests
      - run: uv run --directory backend pytest
